<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>飲食矩陣</title>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f4f0;
  --bg3: #eeede8;
  --text: #1a1a1a;
  --text2: #666660;
  --text3: #999994;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.18);
  --green: #1D9E75;
  --blue: #378ADD;
  --amber: #BA7517;
  --coral: #D85A30;
  --gray: #888780;
  --success-bg: #e1f5ee;
  --success-text: #085041;
  --info-bg: #e6f1fb;
  --info-text: #0c447c;
  --warn-bg: #faeeda;
  --warn-text: #633806;
  --r-md: 8px;
  --r-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --bg2: #262624;
    --bg3: #2e2e2b;
    --text: #f0efe8;
    --text2: #a0a098;
    --text3: #666660;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.18);
    --success-bg: #04342c;
    --success-text: #9fe1cb;
    --info-bg: #042c53;
    --info-text: #b5d4f4;
    --warn-bg: #412402;
    --warn-text: #fac775;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;padding:0.75rem}
.tab-bar{display:flex;gap:5px;margin-bottom:0.75rem;position:sticky;top:0;background:var(--bg);padding:0.5rem 0;z-index:10}
.tab{flex:1;padding:8px 2px;font-size:12px;border:0.5px solid var(--border2);border-radius:var(--r-md);cursor:pointer;background:var(--bg);color:var(--text2);text-align:center;transition:all .15s;user-select:none}
.tab.active{background:var(--bg3);color:var(--text);border-color:var(--border2);font-weight:500}
.section{display:none}
.section.active{display:block}
.view-toggle{display:flex;gap:6px;margin-bottom:0.75rem;align-items:center}
.vbtn{padding:5px 12px;font-size:12px;border:0.5px solid var(--border);border-radius:99px;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:4px;user-select:none}
.vbtn.on{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.filter-row{display:flex;gap:5px;margin-bottom:0.6rem;flex-wrap:wrap}
.tag{padding:4px 10px;font-size:11px;border:0.5px solid var(--border);border-radius:99px;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .15s;user-select:none;white-space:nowrap}
.tag.on{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.sort-row{display:flex;align-items:center;gap:5px;margin-bottom:0.65rem;flex-wrap:wrap;font-size:11px;color:var(--text2)}
.sbtn{padding:3px 9px;font-size:11px;border:0.5px solid var(--border);border-radius:99px;cursor:pointer;background:var(--bg);color:var(--text2);user-select:none}
.sbtn.on{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.food-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:0.65rem 0.9rem;margin-bottom:7px;cursor:pointer;transition:border-color .15s;-webkit-user-select:none;user-select:none}
.food-card.expanded{border-color:var(--border2)}
.card-top{display:flex;align-items:center;gap:9px}
.card-icon{width:32px;height:32px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--bg2)}
.card-main{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:500;color:var(--text)}
.card-sub{font-size:11px;color:var(--text2);margin-top:1px}
.badge{display:inline-block;padding:1px 6px;font-size:10px;border-radius:99px;margin-right:3px}
.bi{background:var(--success-bg);color:var(--success-text)}
.bn{background:var(--info-bg);color:var(--info-text)}
.br{background:var(--warn-bg);color:var(--warn-text)}
.score-col{text-align:right;flex-shrink:0;min-width:54px}
.score-num{font-size:16px;font-weight:500;color:var(--text)}
.score-range{font-size:13px;font-weight:500;color:var(--amber)}
.score-label{font-size:9px;color:var(--text3);margin-top:1px}
.hbar{height:3px;border-radius:2px;background:var(--bg3);margin-top:5px}
.hfill{height:100%;border-radius:2px;background:var(--green)}
.detail{display:none;padding-top:0.65rem;margin-top:0.65rem;border-top:0.5px solid var(--border);font-size:12px;color:var(--text2);line-height:1.6}
.detail.open{display:block}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:7px}
.di{background:var(--bg2);border-radius:var(--r-md);padding:5px 9px}
.di-l{font-size:10px;color:var(--text3)}
.di-v{font-size:13px;font-weight:500;color:var(--text)}
.sub-items{margin-top:7px;display:flex;flex-direction:column;gap:4px}
.sub-item{background:var(--bg2);border-radius:var(--r-md);padding:6px 9px;display:flex;justify-content:space-between;align-items:center}
.sub-name{font-size:12px;color:var(--text2)}
.sub-score{font-size:12px;font-weight:500;color:var(--text)}
.range-note{margin-top:8px;padding:7px 10px;background:var(--warn-bg);border-radius:var(--r-md);font-size:11px;color:var(--warn-text);line-height:1.6}

/* Scatter chart */
.chart-area{position:relative;width:100%;touch-action:none;overflow:hidden;border-radius:var(--r-lg);background:var(--bg2);border:0.5px solid var(--border)}
.chart-area svg{display:block;width:100%;height:100%}
.axis-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:5px}
.chart-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;font-size:11px;color:var(--text2)}
.chart-legend span{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Tooltip */
.tooltip{position:absolute;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r-md);padding:7px 10px;font-size:11px;color:var(--text);pointer-events:none;z-index:20;white-space:nowrap;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.12)}

/* Recipe / guide */
.pot-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:0.9rem;margin-bottom:9px}
.pot-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:7px}
.pot-time{font-size:11px;color:var(--green);font-weight:500}
.pot-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:7px}
.chip{padding:2px 7px;font-size:11px;border:0.5px solid var(--border);border-radius:99px;color:var(--text2);display:inline-block;margin:2px}
.principle-block{background:var(--bg2);border-radius:var(--r-lg);padding:0.9rem;margin-bottom:9px}
.pt{font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px}
.pb{font-size:12px;color:var(--text2);line-height:1.65}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.effort-star{color:var(--amber)}
</style>
</head>
<body>
<div class="app">
  <div class="tab-bar">
    <div class="tab active" data-tab="protein">蛋白質</div>
    <div class="tab" data-tab="fiber">纖維</div>
    <div class="tab" data-tab="pot">一鍋料理</div>
    <div class="tab" data-tab="guide">方針</div>
  </div>

  <div id="protein" class="section active"><div class="loading">載入中…</div></div>
  <div id="fiber" class="section"><div class="loading">載入中…</div></div>
  <div id="pot" class="section"><div class="loading">載入中…</div></div>
  <div id="guide" class="section"><div class="loading">載入中…</div></div>
</div>

<script>
const DATA_URL = './data.json';
let DB = null;
let state = {
  tab: 'protein',
  pFilter: 'all', fFilter: 'all',
  pSort: 'density', fSort: 'density',
  pView: 'list', fView: 'list',
  pExpanded: null, fExpanded: null,
};

async function loadData() {
  try {
    const r = await fetch(DATA_URL);
    DB = await r.json();
  } catch(e) {
    DB = null;
  }
  renderAll();
}

function pDensity(p) { return p.cal > 0 ? p.protein / p.cal * 100 : 0; }
function fDensity(f) { return f.cal > 0 ? f.fiber / f.cal * 100 : 0; }
function stars(n) { return '★'.repeat(n) + '☆'.repeat(3 - n); }

/* ── TAB ── */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    state.tab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
    document.getElementById(state.tab).classList.add('active');
    renderSection(state.tab);
  });
});

function renderAll() {
  renderSection('protein');
  renderSection('fiber');
  renderSection('pot');
  renderSection('guide');
}

function renderSection(tab) {
  if (!DB) { document.getElementById(tab).innerHTML = '<div class="loading">資料載入失敗，請確認 data.json 路徑</div>'; return; }
  if (tab === 'protein') renderProteinSection();
  if (tab === 'fiber') renderFiberSection();
  if (tab === 'pot') renderPotSection();
  if (tab === 'guide') renderGuideSection();
}

/* ── PROTEIN SECTION ── */
function renderProteinSection() {
  const el = document.getElementById('protein');
  el.innerHTML = `
    <div class="view-toggle">
      <span style="font-size:11px;color:var(--text3)">檢視：</span>
      <button class="vbtn${state.pView==='list'?' on':''}" id="pv-list">≡ 列表</button>
      <button class="vbtn${state.pView==='chart'?' on':''}" id="pv-chart">⊹ 座標軸</button>
    </div>
    <div id="p-list-ctrl" style="display:${state.pView==='list'?'block':'none'}">
      <div class="filter-row" id="pFilters">
        <div class="tag${state.pFilter==='all'?' on':''}" data-f="all">全部</div>
        <div class="tag${state.pFilter==='instant'?' on':''}" data-f="instant">⚡ 即食</div>
        <div class="tag${state.pFilter==='nocool'?' on':''}" data-f="nocool">📦 免冷藏</div>
        <div class="tag${state.pFilter==='plant'?' on':''}" data-f="plant">🌱 植物</div>
        <div class="tag${state.pFilter==='animal'?' on':''}" data-f="animal">🥩 動物</div>
      </div>
      <div class="sort-row">排序：
        <span class="sbtn${state.pSort==='density'?' on':''}" data-s="density">每百卡蛋白</span>
        <span class="sbtn${state.pSort==='time'?' on':''}" data-s="time">時間效率</span>
        <span class="sbtn${state.pSort==='sat'?' on':''}" data-s="sat">飽足感</span>
      </div>
    </div>
    <div id="p-list"></div>
    <div id="p-chart" style="display:${state.pView==='chart'?'block':'none'}">
      <div class="chart-legend">
        <span><span class="legend-dot" style="background:var(--coral)"></span>動物性</span>
        <span><span class="legend-dot" style="background:var(--green)"></span>植物性</span>
        <span><span class="legend-dot" style="background:var(--blue)"></span>料理變體</span>
        <span><span class="legend-dot" style="background:var(--amber);border-radius:2px;transform:rotate(45deg)"></span>範圍</span>
      </div>
      <div class="chart-area" id="p-chart-area" style="height:340px"></div>
      <div class="axis-hint">← 需準備　時間效率　免準備 →</div>
    </div>`;

  document.getElementById('pv-list').onclick = () => { state.pView = 'list'; renderProteinSection(); };
  document.getElementById('pv-chart').onclick = () => { state.pView = 'chart'; renderProteinSection(); setTimeout(() => buildScatter('p'), 10); };
  document.querySelectorAll('#pFilters .tag').forEach(t => t.onclick = () => { state.pFilter = t.dataset.f; state.pExpanded = null; renderProteinSection(); });
  document.querySelectorAll('#protein .sbtn').forEach(t => t.onclick = () => { state.pSort = t.dataset.s; state.pExpanded = null; renderProteinSection(); });

  if (state.pView === 'list') renderProteinList();
  else setTimeout(() => buildScatter('p'), 10);
}

function renderProteinList() {
  let list = [...DB.proteins];
  if (state.pFilter === 'instant') list = list.filter(x => x.instant);
  if (state.pFilter === 'nocool') list = list.filter(x => x.nocool);
  if (state.pFilter === 'plant') list = list.filter(x => x.plant);
  if (state.pFilter === 'animal') list = list.filter(x => !x.plant);
  if (state.pSort === 'density') list.sort((a, b) => pDensity(b) - pDensity(a));
  else if (state.pSort === 'time') list.sort((a, b) => b.time - a.time);
  else list.sort((a, b) => b.sat - a.sat);

  const maxD = Math.max(...DB.proteins.map(pDensity));
  const el = document.getElementById('p-list');
  if (!list.length) { el.innerHTML = '<div class="loading">無結果</div>'; return; }

  el.innerHTML = list.map(p => {
    const d = pDensity(p);
    const pct = Math.round(d / maxD * 100);
    const scoreHtml = p.isRange
      ? `<div class="score-range">${p.proteinMin}–${p.proteinMax}g</div><div class="score-label">g蛋白/百卡</div>`
      : `<div class="score-num">${d.toFixed(1)}</div><div class="score-label">g蛋白/百卡</div>`;
    const open = state.pExpanded === p.id;

    let detailExtra = '';
    if (open && p.subItems) {
      const subMaxD = Math.max(...p.subItems.map(s => s.protein / s.cal * 100));
      detailExtra = `<div class="sub-items"><div style="font-size:10px;color:var(--text3);margin-bottom:3px">料理方式比較（每百卡蛋白質）</div>
        ${p.subItems.map(s => {
          const sd = (s.protein / s.cal * 100);
          const sp = Math.round(sd / subMaxD * 100);
          return `<div class="sub-item"><div><div class="sub-name">${s.name}</div><div style="font-size:10px;color:var(--text3)">${s.note}・${s.cal}kcal</div><div class="hbar" style="width:80px;margin-top:3px"><div class="hfill" style="width:${sp}%"></div></div></div><div class="sub-score">${sd.toFixed(1)}g</div></div>`;
        }).join('')}</div>`;
    } else if (open && p.isRange) {
      detailExtra = `<div class="range-note">${p.rangeNote}</div>`;
    }

    return `<div class="food-card${open ? ' expanded' : ''}" data-id="${p.id}">
      <div class="card-top">
        <div class="card-icon">${p.icon}</div>
        <div class="card-main">
          <div class="card-name">${p.name}${p.isRange ? '<span class="badge br" style="margin-left:4px">範圍</span>' : ''}</div>
          <div class="card-sub">${p.instant ? '<span class="badge bi">即食</span>' : ''}${p.nocool ? '<span class="badge bn">免冷藏</span>' : ''}${p.cal}kcal</div>
          <div class="hbar"><div class="hfill" style="width:${pct}%"></div></div>
        </div>
        <div class="score-col">${scoreHtml}</div>
      </div>
      <div class="detail${open ? ' open' : ''}">
        <div>${p.note}</div>
        <div class="dgrid">
          <div class="di"><div class="di-l">每百卡蛋白質</div><div class="di-v">${p.isRange ? p.proteinMin + '–' + p.proteinMax + 'g' : d.toFixed(1) + 'g'}</div></div>
          <div class="di"><div class="di-l">飽足持續</div><div class="di-v">${p.satLevel}</div></div>
          <div class="di"><div class="di-l">時間效率</div><div class="di-v">${p.time}/100</div></div>
          <div class="di"><div class="di-l">預處理</div><div class="di-v">${p.prep === 0 ? '0秒' : p.prep + '分鐘'}</div></div>
        </div>
        ${detailExtra}
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.food-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      state.pExpanded = state.pExpanded === id ? null : id;
      renderProteinList();
    });
  });
}

/* ── FIBER SECTION ── */
function renderFiberSection() {
  const el = document.getElementById('fiber');
  el.innerHTML = `
    <div class="view-toggle">
      <span style="font-size:11px;color:var(--text3)">檢視：</span>
      <button class="vbtn${state.fView==='list'?' on':''}" id="fv-list">≡ 列表</button>
      <button class="vbtn${state.fView==='chart'?' on':''}" id="fv-chart">⊹ 座標軸</button>
    </div>
    <div id="f-list-ctrl" style="display:${state.fView==='list'?'block':'none'}">
      <div class="filter-row" id="fFilters">
        <div class="tag${state.fFilter==='all'?' on':''}" data-f="all">全部</div>
        <div class="tag${state.fFilter==='instant'?' on':''}" data-f="instant">⚡ 即食</div>
        <div class="tag${state.fFilter==='nocool'?' on':''}" data-f="nocool">📦 免冷藏</div>
        <div class="tag${state.fFilter==='highsat'?' on':''}" data-f="highsat">💪 高飽足</div>
      </div>
      <div class="sort-row">排序：
        <span class="sbtn${state.fSort==='density'?' on':''}" data-s="density">每百卡纖維</span>
        <span class="sbtn${state.fSort==='time'?' on':''}" data-s="time">時間效率</span>
        <span class="sbtn${state.fSort==='sat'?' on':''}" data-s="sat">飽足感</span>
      </div>
    </div>
    <div id="f-list"></div>
    <div id="f-chart" style="display:${state.fView==='chart'?'block':'none'}">
      <div class="chart-legend">
        <span><span class="legend-dot" style="background:var(--green)"></span>高飽足</span>
        <span><span class="legend-dot" style="background:var(--blue)"></span>即食</span>
        <span><span class="legend-dot" style="background:var(--gray)"></span>需準備</span>
      </div>
      <div class="chart-area" id="f-chart-area" style="height:340px"></div>
      <div class="axis-hint">← 需準備　時間效率　免準備 →</div>
    </div>`;

  document.getElementById('fv-list').onclick = () => { state.fView = 'list'; renderFiberSection(); };
  document.getElementById('fv-chart').onclick = () => { state.fView = 'chart'; renderFiberSection(); setTimeout(() => buildScatter('f'), 10); };
  document.querySelectorAll('#fFilters .tag').forEach(t => t.onclick = () => { state.fFilter = t.dataset.f; state.fExpanded = null; renderFiberSection(); });
  document.querySelectorAll('#fiber .sbtn').forEach(t => t.onclick = () => { state.fSort = t.dataset.s; state.fExpanded = null; renderFiberSection(); });

  if (state.fView === 'list') renderFiberList();
  else setTimeout(() => buildScatter('f'), 10);
}

function renderFiberList() {
  let list = [...DB.fibers];
  if (state.fFilter === 'instant') list = list.filter(x => x.instant);
  if (state.fFilter === 'nocool') list = list.filter(x => x.nocool);
  if (state.fFilter === 'highsat') list = list.filter(x => x.highsat);
  if (state.fSort === 'density') list.sort((a, b) => fDensity(b) - fDensity(a));
  else if (state.fSort === 'time') list.sort((a, b) => b.time - a.time);
  else list.sort((a, b) => b.sat - a.sat);

  const maxD = Math.max(...DB.fibers.map(fDensity));
  const el = document.getElementById('f-list');
  if (!list.length) { el.innerHTML = '<div class="loading">無結果</div>'; return; }

  el.innerHTML = list.map(f => {
    const d = fDensity(f);
    const pct = Math.round(d / maxD * 100);
    const open = state.fExpanded === f.id;
    return `<div class="food-card${open ? ' expanded' : ''}" data-id="${f.id}">
      <div class="card-top">
        <div class="card-icon">${f.icon}</div>
        <div class="card-main">
          <div class="card-name">${f.name}</div>
          <div class="card-sub">${f.instant ? '<span class="badge bi">即食</span>' : ''}${f.nocool ? '<span class="badge bn">免冷藏</span>' : ''}${f.cal}kcal</div>
          <div class="hbar"><div class="hfill" style="width:${pct}%"></div></div>
        </div>
        <div class="score-col"><div class="score-num">${d.toFixed(2)}</div><div class="score-label">g纖維/百卡</div></div>
      </div>
      <div class="detail${open ? ' open' : ''}">
        <div>${f.note}</div>
        <div class="dgrid">
          <div class="di"><div class="di-l">每百卡纖維</div><div class="di-v">${d.toFixed(2)}g</div></div>
          <div class="di"><div class="di-l">飽足持續</div><div class="di-v">${f.satLevel}</div></div>
          <div class="di"><div class="di-l">時間效率</div><div class="di-v">${f.time}/100</div></div>
          <div class="di"><div class="di-l">預處理</div><div class="di-v">${f.prep === 0 ? '0秒' : f.prep + '分鐘'}</div></div>
        </div>
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.food-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      state.fExpanded = state.fExpanded === id ? null : id;
      renderFiberList();
    });
  });
}

/* ── SCATTER CHART (vanilla SVG + gesture zoom) ── */
function buildScatter(type) {
  const isP = type === 'p';
  const container = document.getElementById(isP ? 'p-chart-area' : 'f-chart-area');
  if (!container) return;

  const W = container.clientWidth || 340;
  const H = container.clientHeight || 340;
  const PAD = { t: 20, r: 20, b: 40, l: 44 };
  const plotW = W - PAD.l - PAD.r;
  const plotH = H - PAD.t - PAD.b;

  const isDark = matchMedia('(prefers-color-scheme:dark)').matches;
  const gridC = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const axisC = isDark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.35)';
  const labelC = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.45)';

  let pts;
  if (isP) {
    pts = [];
    DB.proteins.forEach(p => {
      if (p.subItems) {
        p.subItems.forEach((s, i) => {
          pts.push({ x: p.time - i * 2, y: s.protein / s.cal * 100, label: s.name, color: '#378ADD', shape: 'tri', note: s.note, cal: s.cal });
        });
      } else if (p.isRange) {
        pts.push({ x: p.time, y: (p.proteinMin + p.proteinMax) / 2, yMin: p.proteinMin, yMax: p.proteinMax, label: p.name, color: '#BA7517', shape: 'diamond', note: p.rangeNote });
      } else {
        pts.push({ x: p.time, y: pDensity(p), label: p.name, color: p.plant ? '#1D9E75' : '#D85A30', shape: 'circle', note: p.note, cal: p.cal });
      }
    });
  } else {
    pts = DB.fibers.map(f => ({
      x: f.time, y: fDensity(f), label: f.name,
      color: f.highsat ? '#1D9E75' : f.instant ? '#378ADD' : '#888780',
      shape: 'circle', note: f.note, cal: f.cal
    }));
  }

  const xMin = 20, xMax = 105;
  const allY = pts.flatMap(p => p.yMin !== undefined ? [p.yMin, p.yMax] : [p.y]);
  const yMin = 0, yMax = Math.ceil(Math.max(...allY) * 1.25);

  /* zoom/pan state */
  let vp = { x0: xMin, x1: xMax, y0: yMin, y1: yMax };
  let pinchStart = null;

  function toSvgX(xv) { return PAD.l + (xv - vp.x0) / (vp.x1 - vp.x0) * plotW; }
  function toSvgY(yv) { return PAD.t + plotH - (yv - vp.y0) / (vp.y1 - vp.y0) * plotH; }
  function fromSvgX(sx) { return vp.x0 + (sx - PAD.l) / plotW * (vp.x1 - vp.x0); }
  function fromSvgY(sy) { return vp.y0 + (PAD.t + plotH - sy) / plotH * (vp.y1 - vp.y0); }

  function drawShape(shape, cx, cy, r, color) {
    if (shape === 'circle') return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${r}" fill="${color}" opacity="0.85"/>`;
    if (shape === 'tri') {
      const h = r * 1.6;
      return `<polygon points="${cx},${(cy - h).toFixed(1)} ${(cx - r).toFixed(1)},${(cy + r * 0.8).toFixed(1)} ${(cx + r).toFixed(1)},${(cy + r * 0.8).toFixed(1)}" fill="${color}" opacity="0.85"/>`;
    }
    if (shape === 'diamond') {
      return `<polygon points="${cx},${(cy - r * 1.4).toFixed(1)} ${(cx + r).toFixed(1)},${cy.toFixed(1)} ${cx},${(cy + r * 1.4).toFixed(1)} ${(cx - r).toFixed(1)},${cy.toFixed(1)}" fill="${color}" opacity="0.85"/>`;
    }
    return '';
  }

  function render() {
    const xTicks = 5, yTicks = 5;
    let gridLines = '';
    for (let i = 0; i <= xTicks; i++) {
      const xv = vp.x0 + (vp.x1 - vp.x0) * i / xTicks;
      const sx = toSvgX(xv);
      gridLines += `<line x1="${sx.toFixed(1)}" y1="${PAD.t}" x2="${sx.toFixed(1)}" y2="${PAD.t + plotH}" stroke="${gridC}" stroke-width="1"/>`;
      gridLines += `<text x="${sx.toFixed(1)}" y="${PAD.t + plotH + 14}" text-anchor="middle" font-size="9" fill="${axisC}">${Math.round(xv)}</text>`;
    }
    for (let i = 0; i <= yTicks; i++) {
      const yv = vp.y0 + (vp.y1 - vp.y0) * i / yTicks;
      const sy = toSvgY(yv);
      gridLines += `<line x1="${PAD.l}" y1="${sy.toFixed(1)}" x2="${PAD.l + plotW}" y2="${sy.toFixed(1)}" stroke="${gridC}" stroke-width="1"/>`;
      gridLines += `<text x="${(PAD.l - 5).toFixed(1)}" y="${(sy + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="${axisC}">${yv.toFixed(1)}</text>`;
    }

    let dots = '';
    pts.forEach((pt, idx) => {
      const cx = toSvgX(pt.x);
      const cy = toSvgY(pt.y);
      if (cx < PAD.l - 8 || cx > W - PAD.r + 8 || cy < PAD.t - 8 || cy > H - PAD.b + 8) return;
      const r = 6;
      dots += drawShape(pt.shape, cx, cy, r, pt.color);
      if (pt.yMin !== undefined) {
        const cyMin = toSvgY(pt.yMin), cyMax = toSvgY(pt.yMax);
        dots += `<line x1="${cx.toFixed(1)}" y1="${cyMin.toFixed(1)}" x2="${cx.toFixed(1)}" y2="${cyMax.toFixed(1)}" stroke="${pt.color}" stroke-width="2"/>`;
        dots += `<line x1="${(cx-4).toFixed(1)}" y1="${cyMin.toFixed(1)}" x2="${(cx+4).toFixed(1)}" y2="${cyMin.toFixed(1)}" stroke="${pt.color}" stroke-width="2"/>`;
        dots += `<line x1="${(cx-4).toFixed(1)}" y1="${cyMax.toFixed(1)}" x2="${(cx+4).toFixed(1)}" y2="${cyMax.toFixed(1)}" stroke="${pt.color}" stroke-width="2"/>`;
      }
      const lx = cx + 8, ly = cy - 4;
      const anchor = lx + pt.label.length * 5.5 > W - 4 ? 'end' : 'start';
      const lxAdj = anchor === 'end' ? cx - 8 : lx;
      dots += `<text x="${lxAdj.toFixed(1)}" y="${ly.toFixed(1)}" font-size="9" fill="${labelC}" text-anchor="${anchor}">${pt.label}</text>`;
    });

    const yAxisLabel = isP ? 'g蛋白/百卡' : 'g纖維/百卡';
    const svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
      <rect width="${W}" height="${H}" fill="none"/>
      <clipPath id="plot"><rect x="${PAD.l}" y="${PAD.t}" width="${plotW}" height="${plotH}"/></clipPath>
      <g>${gridLines}</g>
      <text x="${PAD.l - 30}" y="${PAD.t + plotH / 2}" font-size="9" fill="${axisC}" text-anchor="middle" transform="rotate(-90,${PAD.l - 30},${PAD.t + plotH / 2})">${yAxisLabel}</text>
      <rect x="${PAD.l}" y="${PAD.t}" width="${plotW}" height="${plotH}" fill="none" stroke="${gridC}" stroke-width="0.5"/>
      <g clip-path="url(#plot)">${dots}</g>
    </svg>`;
    container.innerHTML = svg + '<div class="tooltip" id="tip-' + type + '"></div>';
    attachGestures();
  }

  function clampVP() {
    const rx = vp.x1 - vp.x0, ry = vp.y1 - vp.y0;
    const minRx = (xMax - xMin) * 0.15, minRy = (yMax - yMin) * 0.15;
    if (rx < minRx) { const m = (vp.x0 + vp.x1) / 2; vp.x0 = m - minRx / 2; vp.x1 = m + minRx / 2; }
    if (ry < minRy) { const m = (vp.y0 + vp.y1) / 2; vp.y0 = m - minRy / 2; vp.y1 = m + minRy / 2; }
    if (vp.x0 < xMin - (xMax - xMin) * 0.2) vp.x0 = xMin - (xMax - xMin) * 0.2;
    if (vp.x1 > xMax + (xMax - xMin) * 0.2) vp.x1 = xMax + (xMax - xMin) * 0.2;
    if (vp.y0 < yMin - (yMax - yMin) * 0.2) vp.y0 = yMin - (yMax - yMin) * 0.2;
    if (vp.y1 > yMax + (yMax - yMin) * 0.2) vp.y1 = yMax + (yMax - yMin) * 0.2;
  }

  function attachGestures() {
    const el = container;
    let lastTouch = null;
    let dragStart = null;

    /* wheel zoom */
    el.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = el.getBoundingClientRect();
      const mx = fromSvgX((e.clientX - rect.left) * W / rect.width);
      const my = fromSvgY((e.clientY - rect.top) * H / rect.height);
      const factor = e.deltaY > 0 ? 1.15 : 0.87;
      vp.x0 = mx + (vp.x0 - mx) * factor;
      vp.x1 = mx + (vp.x1 - mx) * factor;
      vp.y0 = my + (vp.y0 - my) * factor;
      vp.y1 = my + (vp.y1 - my) * factor;
      clampVP(); render();
    }, { passive: false });

    /* touch */
    el.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, vp: { ...vp } };
        lastTouch = null;
      } else if (e.touches.length === 2) {
        dragStart = null;
        pinchStart = {
          dist: Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY),
          mx: fromSvgX(((e.touches[0].clientX + e.touches[1].clientX) / 2 - el.getBoundingClientRect().left) * W / el.clientWidth),
          my: fromSvgY(((e.touches[0].clientY + e.touches[1].clientY) / 2 - el.getBoundingClientRect().top) * H / el.clientHeight),
          vp: { ...vp }
        };
      }
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 2 && pinchStart) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const scale = pinchStart.dist / dist;
        const mx = pinchStart.mx, my = pinchStart.my;
        vp.x0 = mx + (pinchStart.vp.x0 - mx) * scale;
        vp.x1 = mx + (pinchStart.vp.x1 - mx) * scale;
        vp.y0 = my + (pinchStart.vp.y0 - my) * scale;
        vp.y1 = my + (pinchStart.vp.y1 - my) * scale;
        clampVP(); render();
      } else if (e.touches.length === 1 && dragStart) {
        const dx = (e.touches[0].clientX - dragStart.x) / el.clientWidth * (dragStart.vp.x1 - dragStart.vp.x0);
        const dy = (e.touches[0].clientY - dragStart.y) / el.clientHeight * (dragStart.vp.y1 - dragStart.vp.y0);
        vp.x0 = dragStart.vp.x0 - dx;
        vp.x1 = dragStart.vp.x1 - dx;
        vp.y0 = dragStart.vp.y0 + dy;
        vp.y1 = dragStart.vp.y1 + dy;
        clampVP(); render();
      }
    }, { passive: false });

    el.addEventListener('touchend', e => {
      if (e.touches.length < 2) pinchStart = null;
      if (e.touches.length === 0) {
        dragStart = null;
        /* tap to show tooltip */
        const t = e.changedTouches[0];
        const rect = el.getBoundingClientRect();
        const sx = (t.clientX - rect.left) * W / rect.width;
        const sy = (t.clientY - rect.top) * H / rect.height;
        showTooltip(sx, sy, t.clientX - rect.left, t.clientY - rect.top);
      }
    }, { passive: true });

    /* double-tap reset */
    let lastTap = 0;
    el.addEventListener('touchstart', e => {
      const now = Date.now();
      if (now - lastTap < 300) { vp = { x0: xMin, x1: xMax, y0: yMin, y1: yMax }; render(); }
      lastTap = now;
    }, { passive: true });
  }

  function showTooltip(sx, sy, px, py) {
    const tip = document.getElementById('tip-' + type);
    if (!tip) return;
    const R = 12;
    let hit = null;
    pts.forEach(pt => {
      const cx = toSvgX(pt.x), cy = toSvgY(pt.y);
      if (Math.hypot(sx - cx, sy - cy) < R) hit = pt;
    });
    if (!hit) { tip.style.display = 'none'; return; }
    const yd = hit.yMin !== undefined ? `${hit.yMin.toFixed(1)}–${hit.yMax.toFixed(1)}` : hit.y.toFixed(isP ? 1 : 2);
    tip.innerHTML = `<strong>${hit.label}</strong><br>時間效率: ${hit.x}<br>${isP ? '蛋白' : '纖維'}: ${yd}g/百卡`;
    tip.style.display = 'block';
    const left = Math.min(px + 10, container.clientWidth - 140);
    const top = Math.max(py - 60, 5);
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
    setTimeout(() => { tip.style.display = 'none'; }, 2500);
  }

  render();
}

/* ── POT SECTION ── */
function renderPotSection() {
  document.getElementById('pot').innerHTML = DB.recipes.map(r => `
    <div class="pot-card">
      <div class="pot-title">${r.icon} ${r.name} <span class="pot-time">${r.time}</span></div>
      <div class="pot-desc">${r.desc}</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px;line-height:1.75">
        ${r.steps.map((s, i) => `<span style="color:var(--text3)">${i + 1}.</span> ${s}`).join('<br>')}
      </div>
      <div style="display:flex;gap:10px;font-size:11px;color:var(--text2);margin-bottom:7px">
        <span>蛋白：${r.protein}</span><span>熱量：${r.cal}</span>
        <span class="effort-star">${'★'.repeat(r.effort)}${'☆'.repeat(3 - r.effort)}</span>
      </div>
      <div>${r.ingredients.map(i => `<span class="chip">${i}</span>`).join('')}</div>
    </div>`).join('');
}

/* ── GUIDE SECTION ── */
function renderGuideSection() {
  document.getElementById('guide').innerHTML = DB.principles.map(p => `
    <div class="principle-block">
      <div class="pt">${p.icon} ${p.title}</div>
      <div class="pb">${p.body}</div>
    </div>`).join('');
}

loadData();
</script>
